name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# `github.com/rocky-hq/contracts/go` is a private Go module — the public
# Go module proxy cannot resolve it. GOPRIVATE tells `go get` to bypass
# the proxy/sumdb for rocky-hq paths; each job that runs `go mod` /
# `go build` then configures git with a read-only PAT (org secret
# ROCKY_HQ_RO_TOKEN) so the direct git fetch authenticates.
#
# Forks: this token is org-scoped; PRs from public forks will fail at
# the `go mod download` step. That's an accepted tradeoff for keeping
# contracts private (see rocky-hq/rocky Phase 5b plan §"Contracts
# visibility decision").
env:
  GOPRIVATE: github.com/rocky-hq/*

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Authenticate to rocky-hq private Go modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.ROCKY_HQ_RO_TOKEN }}@github.com/rocky-hq/".insteadOf "https://github.com/rocky-hq/"
      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest
      - name: gofumpt
        run: |
          out=$(gofumpt -l .)
          if [ -n "$out" ]; then
            echo "gofumpt would reformat:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - name: golangci-lint
        run: golangci-lint run
      - name: go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod
          # go.sum only exists when there are dependencies; skip if absent.
          if [ -f go.sum ]; then git diff --exit-code go.sum; fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Authenticate to rocky-hq private Go modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.ROCKY_HQ_RO_TOKEN }}@github.com/rocky-hq/".insteadOf "https://github.com/rocky-hq/"
      - run: go build ./...
      - run: go test ./... -race -count=1

  integration:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.pull_request.labels.*.name, 'integration') || github.event_name == 'push' }}
    env:
      ROCKY_HEARTH_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Authenticate to rocky-hq private Go modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.ROCKY_HQ_RO_TOKEN }}@github.com/rocky-hq/".insteadOf "https://github.com/rocky-hq/"
      # Phase 5a: integration suite is a stub (no test/integration/ files yet).
      # The job exists so 5c's PR adds tests under test/integration/ without
      # also having to wire CI.
      - name: "integration tests (Phase 5a: stub)"
        run: |
          if [ -d test/integration ]; then
            go test ./test/integration/... -race -count=1
          else
            echo "No test/integration/ yet — Phase 5c lands the LocalDocker tests."
          fi
